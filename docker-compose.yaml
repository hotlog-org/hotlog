version: '3.9'

services:
  db:
    image: postgres:16
    container_name: hotlog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  events-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotlog-events-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      GO_DATABASE_URL: ${GO_DATABASE_URL:-postgres://postgres:postgres@db:5432/hotlog?sslmode=disable}
      GO_API_ADDR: ${GO_API_ADDR:-:8080}
      GO_API_INTERNAL_TOKEN: ${GO_API_INTERNAL_TOKEN:-dev-internal-token}
    ports:
      - '8080:8080'

volumes:
  pgdata:
